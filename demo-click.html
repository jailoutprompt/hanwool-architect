<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클릭 인터랙션 비교</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#1c1f26;color:#e0e0e0;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden}

/* TAB */
.tab-nav{position:sticky;top:0;z-index:100;background:#15171d;border-bottom:1px solid #2a2d36;display:flex;justify-content:center;gap:8px;padding:14px 16px}
.tab-btn{background:transparent;color:#888;border:1px solid #2a2d36;padding:10px 24px;border-radius:8px;cursor:pointer;font-family:'Noto Sans KR';font-size:14px;font-weight:500;transition:all .3s}
.tab-btn:hover{color:#c4a55a;border-color:rgba(196,165,90,.3)}
.tab-btn.active{color:#c4a55a;border-color:#c4a55a;background:rgba(196,165,90,.08)}

/* SECTION */
.section{display:none;padding:40px 20px 60px;max-width:1100px;margin:0 auto;animation:fadeIn .4s}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.section-header{text-align:center;margin-bottom:36px}
.section-header h2{font-family:'Noto Serif KR';font-size:28px;color:#c4a55a;margin-bottom:8px}
.section-header p{color:#777;font-size:14px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:768px){.grid{grid-template-columns:repeat(2,1fr);gap:10px}.tab-btn{padding:8px 16px;font-size:12px}}
@media(max-width:480px){.grid{grid-template-columns:1fr}}

/* CARD */
.card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:4/3;background:#22252e}
.card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s}
.card:hover img{transform:scale(1.05)}
.card-overlay{position:absolute;bottom:0;left:0;right:0;padding:28px 14px 12px;background:linear-gradient(transparent,rgba(0,0,0,.75));pointer-events:none}
.card-name{font-size:14px;font-weight:500;color:#fff}
.card-type{font-size:11px;color:#c4a55a;margin-top:2px}

/* ===== LIGHTBOX ===== */
.overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .35s,visibility .35s}
.overlay.open{opacity:1;visibility:visible}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.88)}
.close-btn{position:absolute;top:20px;right:24px;background:none;border:none;color:#aaa;font-size:32px;cursor:pointer;z-index:10;line-height:1;transition:color .2s}
.close-btn:hover{color:#fff}
#lightbox .lb-content{position:relative;z-index:2;max-width:90vw;max-height:85vh;display:flex;flex-direction:column;align-items:center}
#lightbox .lb-img{max-width:90vw;max-height:75vh;object-fit:contain;border-radius:6px}
#lightbox .lb-info{margin-top:16px;text-align:center}
#lightbox .lb-info h3{font-size:18px;color:#fff}
#lightbox .lb-info span{font-size:13px;color:#c4a55a}
.lb-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:10;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;width:48px;height:48px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lb-arrow:hover{background:rgba(255,255,255,.18)}
.lb-arrow.prev{left:16px}
.lb-arrow.next{right:16px}

/* ===== FULLPAGE ===== */
#fullpage{position:fixed;inset:0;z-index:1000;background:#1c1f26;overflow-y:auto;-webkit-overflow-scrolling:touch;opacity:0;visibility:hidden;transition:opacity .4s}
#fullpage.open{opacity:1;visibility:visible}

#fullpage .fp-img-wrap{width:100%;aspect-ratio:4/3;max-height:70vh;overflow:hidden;position:relative}
#fullpage .fp-img-wrap img{width:100%;height:100%;object-fit:cover;animation:fpZoom .7s ease forwards}
@keyframes fpZoom{from{transform:scale(1.08)}to{transform:scale(1)}}

#fullpage .fp-info{max-width:700px;margin:0 auto;padding:40px 24px 80px}
#fullpage .fp-info h2{font-family:'Noto Serif KR';font-size:28px;color:#fff;margin-bottom:6px}
#fullpage .fp-info .fp-type{color:#c4a55a;font-size:14px;margin-bottom:24px}
#fullpage .fp-desc{font-size:15px;line-height:2;color:#999;font-weight:300;margin-bottom:32px;letter-spacing:.3px}
#fullpage .fp-detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.fp-detail-item{background:#22252e;padding:16px 20px;border-radius:8px;border:1px solid #2a2d36}
.fp-detail-item .fp-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;font-family:'Courier New',monospace;margin-bottom:4px}
.fp-detail-item .fp-val{font-size:16px;color:#fff;font-weight:500}
#fullpage .fp-close{position:fixed;top:20px;right:24px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);color:#fff;width:44px;height:44px;border-radius:50%;font-size:22px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:background .2s}
#fullpage .fp-close:hover{background:rgba(0,0,0,.8)}

@media(max-width:480px){
  #fullpage .fp-img-wrap{max-height:50vh}
  #fullpage .fp-detail-grid{grid-template-columns:1fr}
  #fullpage .fp-info{padding:28px 20px 60px}
  #fullpage .fp-info h2{font-size:22px}
  #fullpage .fp-desc{font-size:14px}
}
</style>
</head>
<body>

<nav class="tab-nav">
  <button class="tab-btn active" data-tab="0">1. 라이트박스</button>
  <button class="tab-btn" data-tab="1">2. 풀페이지</button>
</nav>

<div id="app"></div>

<!-- LIGHTBOX -->
<div class="overlay" id="lightbox">
  <div class="overlay-bg" onclick="closeLB()"></div>
  <button class="close-btn" onclick="closeLB()">&times;</button>
  <button class="lb-arrow prev" onclick="lbNav(-1)">&#8249;</button>
  <button class="lb-arrow next" onclick="lbNav(1)">&#8250;</button>
  <div class="lb-content">
    <img class="lb-img" id="lb-img" src="">
    <div class="lb-info"><h3 id="lb-name"></h3><span id="lb-year"></span></div>
  </div>
</div>

<!-- FULLPAGE -->
<div id="fullpage">
  <button class="fp-close" onclick="closeFP()">&times;</button>
  <div class="fp-img-wrap"><img id="fp-img" src=""></div>
  <div class="fp-info">
    <h2 id="fp-name"></h2>
    <div class="fp-type" id="fp-type-label"></div>
    <p class="fp-desc" id="fp-desc"></p>
    <div class="fp-detail-grid">
      <div class="fp-detail-item"><div class="fp-label">location</div><div class="fp-val" id="fp-location"></div></div>
      <div class="fp-detail-item"><div class="fp-label">type</div><div class="fp-val" id="fp-type"></div></div>
      <div class="fp-detail-item"><div class="fp-label">area</div><div class="fp-val" id="fp-area"></div></div>
      <div class="fp-detail-item"><div class="fp-label">year</div><div class="fp-val" id="fp-year"></div></div>
    </div>
  </div>
</div>

<script>
const projects = [
  { name: "그레이 모던 주택", location: "경남 김해시", type: "단독주택", area: "198㎡", year: "2023", img: "new_그레이모던주택.jpeg",
    desc: "산 아래 자리한 이 주택은 자연석 조경과 금속 패널의 대비를 통해 자연과 건축의 경계를 허물었습니다. 파노라마 창을 통해 사계절 산세를 실내로 끌어들이는 설계로, 거주자의 일상에 풍경이 스며드는 공간을 완성했습니다." },
  { name: "전통 한옥", location: "경남 김해시", type: "한옥", area: "165㎡", year: "2022", img: "new_한옥.jpeg",
    desc: "전통 목구조의 격식을 지키면서도 현대적 단열과 설비를 적용한 신한옥입니다. 소나무 정원이 처마 아래로 스며들어, 안과 밖의 경계가 자연스럽게 흐려집니다." },
  { name: "곡선 상업건물", location: "경남 김해시", type: "상업시설", area: "430㎡", year: "2023", img: "new_곡선건물.jpeg",
    desc: "주변 산세의 능선을 건축 언어로 번역한 곡선 외벽이 특징입니다. 코르텐강 마감이 시간이 지날수록 깊어지는 색감을 만들어내며, 건물 자체가 풍경의 일부가 되도록 설계했습니다. 내부에서는 곡면을 따라 자연광이 유입되어 별도의 조명 없이도 밝은 공간이 유지됩니다." },
  { name: "대형 복합건물", location: "경남 김해시", type: "복합시설", area: "890㎡", year: "2024", img: "new_복합건물_정면.jpeg",
    desc: "유리 커튼월과 목재 패널이 교차하는 파사드가 건물에 리듬감을 부여합니다. 필로티 구조로 지상 공간을 개방하여 지역 커뮤니티의 동선을 건물 안으로 자연스럽게 유도했습니다." },
  { name: "디자인 공장", location: "경남 김해시", type: "공장", area: "1,200㎡", year: "2023", img: "new_주황공장_전경.jpeg",
    desc: "산업시설도 도시 경관의 일부라는 철학으로 설계했습니다. 주황색 코르텐강 파사드가 기존 공장 지대의 무채색 풍경에 생기를 더합니다." },
  { name: "다크 모던 주택", location: "경남 김해시", type: "단독주택", area: "220㎡", year: "2022", img: "new_다크모던주택.jpeg",
    desc: "다크 메탈릭 외장과 라이트 패널의 투톤 구성으로 건물의 매스감을 극적으로 연출한 주택입니다. 경사지 대지의 레벨 차를 활용해 각 층마다 다른 풍경을 제공하며, 자연석 옹벽이 건축과 지형을 하나로 이어줍니다. 옥상 데크에서는 주변 산세가 360도로 펼쳐집니다." },
];

const IMG = 'hanwool-images/';
const secs = [
  { title: '라이트박스', desc: '사진을 크게 보고, 좌우 화살표로 넘기는 방식' },
  { title: '풀페이지', desc: '사진이 확장되고, 프로젝트 설명이 함께 나오는 방식' },
];

const app = document.getElementById('app');
secs.forEach((sec, si) => {
  const div = document.createElement('div');
  div.className = 'section' + (si === 0 ? ' active' : '');
  div.dataset.section = si;
  let cards = '';
  projects.forEach((p, pi) => {
    cards += `<div class="card" onclick="handleClick(${si},${pi})">
      <img src="${IMG}${p.img}" alt="${p.name}" loading="lazy">
      <div class="card-overlay"><div class="card-name">${p.name}</div><div class="card-type">${p.type}</div></div>
    </div>`;
  });
  div.innerHTML = `<div class="section-header"><h2>${si+1}. ${sec.title}</h2><p>${sec.desc}</p></div><div class="grid">${cards}</div>`;
  app.appendChild(div);
});

// TAB
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelector(`.section[data-section="${btn.dataset.tab}"]`).classList.add('active');
  });
});

function handleClick(sec, idx) {
  if (sec === 0) openLB(idx);
  else openFP(idx);
}

// LIGHTBOX
let lbIdx = 0;
function openLB(idx) {
  lbIdx = idx;
  updateLB();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function updateLB() {
  const p = projects[lbIdx];
  document.getElementById('lb-img').src = IMG + p.img;
  document.getElementById('lb-name').textContent = p.name;
  document.getElementById('lb-year').textContent = p.year + ' · ' + p.type;
}
function lbNav(dir) {
  lbIdx = (lbIdx + dir + projects.length) % projects.length;
  updateLB();
}
function closeLB() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// FULLPAGE
function openFP(idx) {
  const p = projects[idx];
  const fp = document.getElementById('fullpage');
  document.getElementById('fp-img').src = IMG + p.img;
  document.getElementById('fp-name').textContent = p.name;
  document.getElementById('fp-type-label').textContent = p.type + ' · ' + p.location;
  document.getElementById('fp-desc').textContent = p.desc;
  document.getElementById('fp-location').textContent = p.location;
  document.getElementById('fp-type').textContent = p.type;
  document.getElementById('fp-area').textContent = p.area;
  document.getElementById('fp-year').textContent = p.year;
  fp.classList.add('open');
  fp.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}
function closeFP() {
  document.getElementById('fullpage').classList.remove('open');
  document.body.style.overflow = '';
}

// ESC + arrow keys
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLB(); closeFP(); }
  if (document.getElementById('lightbox').classList.contains('open')) {
    if (e.key === 'ArrowLeft') lbNav(-1);
    if (e.key === 'ArrowRight') lbNav(1);
  }
});
</script>
</body>
</html>
