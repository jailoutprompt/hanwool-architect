<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클릭 인터랙션 비교</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#1c1f26;color:#e0e0e0;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden}

.tab-nav{position:sticky;top:0;z-index:100;background:#15171d;border-bottom:1px solid #2a2d36;display:flex;justify-content:center;gap:6px;padding:12px 12px;flex-wrap:wrap}
.tab-btn{background:transparent;color:#888;border:1px solid #2a2d36;padding:9px 18px;border-radius:8px;cursor:pointer;font-family:'Noto Sans KR';font-size:13px;font-weight:500;transition:all .3s;white-space:nowrap}
.tab-btn:hover{color:#c4a55a;border-color:rgba(196,165,90,.3)}
.tab-btn.active{color:#c4a55a;border-color:#c4a55a;background:rgba(196,165,90,.08)}

.section{display:none;padding:40px 20px 60px;max-width:1100px;margin:0 auto;animation:fadeIn .4s}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.section-header{text-align:center;margin-bottom:36px}
.section-header h2{font-family:'Noto Serif KR';font-size:24px;color:#c4a55a;margin-bottom:6px}
.section-header p{color:#666;font-size:13px}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:4/3;background:#22252e}
.card img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;transition:transform .5s}
.card:hover img{transform:scale(1.05)}
.card-overlay{position:absolute;bottom:0;left:0;right:0;padding:28px 14px 12px;background:linear-gradient(transparent,rgba(0,0,0,.75));pointer-events:none}
.card-name{font-size:14px;font-weight:500;color:#fff}
.card-type{font-size:11px;color:#c4a55a;margin-top:2px}

/* ===== COMMON OVERLAY ===== */
.modal-overlay{position:fixed;inset:0;z-index:1000;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-overlay.open{opacity:1;visibility:visible}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(8px)}
.modal-close{position:fixed;top:16px;right:20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:rgba(255,255,255,.2)}

/* ===== 1. LIGHTBOX ===== */
#lightbox{display:flex;align-items:center;justify-content:center}
#lightbox .lb-content{position:relative;z-index:2;max-width:90vw;max-height:85vh;display:flex;flex-direction:column;align-items:center}
#lightbox .lb-img{max-width:90vw;max-height:75vh;object-fit:contain;border-radius:6px}
#lightbox .lb-info{margin-top:16px;text-align:center}
#lightbox .lb-info h3{font-size:18px;color:#fff}
#lightbox .lb-info span{font-size:13px;color:#c4a55a}
.lb-arrow{position:fixed;top:50%;transform:translateY(-50%);z-index:10;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;width:48px;height:48px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lb-arrow:hover{background:rgba(255,255,255,.18)}
.lb-arrow.prev{left:16px}
.lb-arrow.next{right:16px}

/* ===== 2. 좌우분할 ===== */
#splitModal .split-box{position:relative;z-index:2;max-width:1000px;width:94vw;margin:40px auto;display:grid;grid-template-columns:1.2fr 1fr;background:#1a1d24;border-radius:12px;overflow:hidden;border:1px solid #2a2d36}
#splitModal .split-img{aspect-ratio:4/3;overflow:hidden}
#splitModal .split-img img{width:100%;height:100%;object-fit:cover;object-position:center}
#splitModal .split-text{padding:40px 36px;display:flex;flex-direction:column;justify-content:center;border-left:1px solid #2a2d36}
#splitModal .split-text h3{font-family:'Noto Serif KR';font-size:22px;color:#fff;margin-bottom:6px}
#splitModal .split-text .st-type{font-size:12px;color:#c4a55a;letter-spacing:2px;margin-bottom:20px}
#splitModal .split-text .st-desc{font-size:14px;line-height:2;color:#888;font-weight:300;margin-bottom:24px}
#splitModal .split-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#splitModal .split-meta-item{background:rgba(255,255,255,.03);padding:12px;border-radius:6px;border:1px solid rgba(255,255,255,.04)}
#splitModal .split-meta-item .sm-label{font-size:9px;color:#555;letter-spacing:2px;text-transform:uppercase;font-family:'Courier New',monospace}
#splitModal .split-meta-item .sm-val{font-size:14px;color:#ddd;margin-top:2px}
@media(max-width:700px){
  #splitModal .split-box{grid-template-columns:1fr}
  #splitModal .split-text{border-left:none;border-top:1px solid #2a2d36;padding:28px 24px}
}

/* ===== 3. 카드형 ===== */
#cardModal .card-box{position:relative;z-index:2;max-width:700px;width:92vw;margin:40px auto;background:#1a1d24;border-radius:12px;overflow:hidden;border:1px solid #2a2d36}
#cardModal .card-box-img{aspect-ratio:4/3;overflow:hidden}
#cardModal .card-box-img img{width:100%;height:100%;object-fit:cover;object-position:center}
#cardModal .card-box-text{padding:32px 28px 36px}
#cardModal .card-box-text h3{font-family:'Noto Serif KR';font-size:22px;color:#fff;margin-bottom:6px}
#cardModal .card-box-text .ct-type{font-size:12px;color:#c4a55a;letter-spacing:2px;margin-bottom:16px}
#cardModal .card-box-text .ct-desc{font-size:14px;line-height:2;color:#888;font-weight:300;margin-bottom:20px}
#cardModal .card-box-meta{display:flex;gap:24px;padding-top:16px;border-top:1px solid rgba(255,255,255,.06)}
#cardModal .card-box-meta div{font-size:12px;color:#666}
#cardModal .card-box-meta span{color:#ddd;font-weight:500}

/* ===== 4. 시네마틱 ===== */
#cinemaModal .cinema-box{position:relative;z-index:2;width:100%;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end}
#cinemaModal .cinema-bg{position:fixed;inset:0;z-index:1}
#cinemaModal .cinema-bg img{width:100%;height:100%;object-fit:cover;object-position:center;filter:brightness(.4)}
#cinemaModal .cinema-gradient{position:fixed;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent,rgba(0,0,0,.85));z-index:2}
#cinemaModal .cinema-text{position:relative;z-index:3;max-width:700px;padding:0 48px 60px}
#cinemaModal .cinema-text h3{font-family:'Noto Serif KR';font-size:clamp(24px,4vw,36px);color:#fff;margin-bottom:6px;font-weight:300;letter-spacing:2px}
#cinemaModal .cinema-text .cm-type{font-size:12px;color:#c4a55a;letter-spacing:3px;margin-bottom:20px}
#cinemaModal .cinema-text .cm-desc{font-size:15px;line-height:2;color:rgba(255,255,255,.6);font-weight:300;margin-bottom:24px;max-width:500px}
#cinemaModal .cinema-text .cm-meta{display:flex;gap:32px}
#cinemaModal .cinema-text .cm-meta div{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1px}
#cinemaModal .cinema-text .cm-meta span{display:block;font-size:15px;color:#fff;margin-top:2px;font-weight:400}
@media(max-width:600px){
  #cinemaModal .cinema-text{padding:0 24px 40px}
  #cinemaModal .cinema-text .cm-meta{flex-wrap:wrap;gap:20px}
}

@media(max-width:768px){.grid{grid-template-columns:repeat(2,1fr);gap:10px}.tab-btn{padding:7px 12px;font-size:11px}}
@media(max-width:480px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav class="tab-nav">
  <button class="tab-btn active" data-tab="0">라이트박스</button>
  <button class="tab-btn" data-tab="1">좌우분할</button>
  <button class="tab-btn" data-tab="2">카드형</button>
  <button class="tab-btn" data-tab="3">시네마틱</button>
</nav>

<div id="app"></div>

<!-- 1. LIGHTBOX -->
<div class="modal-overlay" id="lightbox">
  <div class="modal-bg" onclick="closeAll()"></div>
  <button class="modal-close" onclick="closeAll()">&times;</button>
  <button class="lb-arrow prev" onclick="lbNav(-1)">&#8249;</button>
  <button class="lb-arrow next" onclick="lbNav(1)">&#8250;</button>
  <div class="lb-content">
    <img class="lb-img" id="lb-img" src="">
    <div class="lb-info"><h3 id="lb-name"></h3><span id="lb-year"></span></div>
  </div>
</div>

<!-- 2. 좌우분할 -->
<div class="modal-overlay" id="splitModal">
  <div class="modal-bg" onclick="closeAll()"></div>
  <button class="modal-close" onclick="closeAll()">&times;</button>
  <div class="split-box">
    <div class="split-img"><img id="sp-img" src=""></div>
    <div class="split-text">
      <h3 id="sp-name"></h3>
      <div class="st-type" id="sp-type"></div>
      <p class="st-desc" id="sp-desc"></p>
      <div class="split-meta">
        <div class="split-meta-item"><div class="sm-label">Location</div><div class="sm-val" id="sp-loc"></div></div>
        <div class="split-meta-item"><div class="sm-label">Type</div><div class="sm-val" id="sp-tp"></div></div>
        <div class="split-meta-item"><div class="sm-label">Area</div><div class="sm-val" id="sp-area"></div></div>
        <div class="split-meta-item"><div class="sm-label">Year</div><div class="sm-val" id="sp-year"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- 3. 카드형 -->
<div class="modal-overlay" id="cardModal">
  <div class="modal-bg" onclick="closeAll()"></div>
  <button class="modal-close" onclick="closeAll()">&times;</button>
  <div class="card-box">
    <div class="card-box-img"><img id="cd-img" src=""></div>
    <div class="card-box-text">
      <h3 id="cd-name"></h3>
      <div class="ct-type" id="cd-type"></div>
      <p class="ct-desc" id="cd-desc"></p>
      <div class="card-box-meta">
        <div>위치 <span id="cd-loc"></span></div>
        <div>면적 <span id="cd-area"></span></div>
        <div>연도 <span id="cd-year"></span></div>
      </div>
    </div>
  </div>
</div>

<!-- 4. 시네마틱 -->
<div class="modal-overlay" id="cinemaModal">
  <div class="modal-bg" onclick="closeAll()"></div>
  <button class="modal-close" onclick="closeAll()" style="mix-blend-mode:difference">&times;</button>
  <div class="cinema-box">
    <div class="cinema-bg"><img id="cm-img" src=""></div>
    <div class="cinema-gradient"></div>
    <div class="cinema-text">
      <h3 id="cm-name"></h3>
      <div class="cm-type" id="cm-type"></div>
      <p class="cm-desc" id="cm-desc"></p>
      <div class="cm-meta">
        <div>LOCATION<span id="cm-loc"></span></div>
        <div>AREA<span id="cm-area"></span></div>
        <div>YEAR<span id="cm-year"></span></div>
      </div>
    </div>
  </div>
</div>

<script>
const P = [
  { name:"그레이 모던 주택", location:"경남 김해시", type:"단독주택", area:"198㎡", year:"2023", img:"new_그레이모던주택.jpeg",
    desc:"산 아래 자리한 이 주택은 자연석 조경과 금속 패널의 대비를 통해 자연과 건축의 경계를 허물었습니다. 파노라마 창을 통해 사계절 산세를 실내로 끌어들이는 설계로, 거주자의 일상에 풍경이 스며드는 공간을 완성했습니다." },
  { name:"전통 한옥", location:"경남 김해시", type:"한옥", area:"165㎡", year:"2022", img:"new_한옥.jpeg",
    desc:"전통 목구조의 격식을 지키면서도 현대적 단열과 설비를 적용한 신한옥입니다. 소나무 정원이 처마 아래로 스며들어, 안과 밖의 경계가 자연스럽게 흐려집니다." },
  { name:"곡선 상업건물", location:"경남 김해시", type:"상업시설", area:"430㎡", year:"2023", img:"new_곡선건물.jpeg",
    desc:"주변 산세의 능선을 건축 언어로 번역한 곡선 외벽이 특징입니다. 코르텐강 마감이 시간이 지날수록 깊어지는 색감을 만들어내며, 건물 자체가 풍경의 일부가 되도록 설계했습니다." },
  { name:"대형 복합건물", location:"경남 김해시", type:"복합시설", area:"890㎡", year:"2024", img:"new_복합건물_정면.jpeg",
    desc:"유리 커튼월과 목재 패널이 교차하는 파사드가 건물에 리듬감을 부여합니다. 필로티 구조로 지상 공간을 개방하여 지역 커뮤니티의 동선을 건물 안으로 자연스럽게 유도했습니다." },
  { name:"디자인 공장", location:"경남 김해시", type:"공장", area:"1,200㎡", year:"2023", img:"new_주황공장_전경.jpeg",
    desc:"산업시설도 도시 경관의 일부라는 철학으로 설계했습니다. 주황색 코르텐강 파사드가 기존 공장 지대의 무채색 풍경에 생기를 더합니다." },
  { name:"다크 모던 주택", location:"경남 김해시", type:"단독주택", area:"220㎡", year:"2022", img:"new_다크모던주택.jpeg",
    desc:"다크 메탈릭 외장과 라이트 패널의 투톤 구성으로 건물의 매스감을 극적으로 연출한 주택입니다. 경사지 대지의 레벨 차를 활용해 각 층마다 다른 풍경을 제공하며, 옥상 데크에서는 주변 산세가 360도로 펼쳐집니다." },
];
const I='hanwool-images/';
const tabs=[
  {title:'라이트박스',desc:'사진만 크게. 좌우 화살표로 넘기기'},
  {title:'좌우분할',desc:'왼쪽 사진 + 오른쪽 프로젝트 설명'},
  {title:'카드형',desc:'위 사진 + 아래 설명. 깔끔한 카드'},
  {title:'시네마틱',desc:'사진 풀스크린 배경 + 하단 텍스트 오버레이'},
];

const app=document.getElementById('app');
tabs.forEach((t,si)=>{
  const d=document.createElement('div');
  d.className='section'+(si===0?' active':'');
  d.dataset.section=si;
  let c='';
  P.forEach((p,pi)=>{
    c+=`<div class="card" onclick="handleClick(${si},${pi})"><img src="${I}${p.img}" alt="${p.name}" loading="lazy"><div class="card-overlay"><div class="card-name">${p.name}</div><div class="card-type">${p.type}</div></div></div>`;
  });
  d.innerHTML=`<div class="section-header"><h2>${t.title}</h2><p>${t.desc}</p></div><div class="grid">${c}</div>`;
  app.appendChild(d);
});

document.querySelectorAll('.tab-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelector(`.section[data-section="${b.dataset.tab}"]`).classList.add('active');
  });
});

function handleClick(s,i){
  if(s===0)openLB(i);
  else if(s===1)openSplit(i);
  else if(s===2)openCard(i);
  else openCinema(i);
}

function closeAll(){
  document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open'));
  document.body.style.overflow='';
}

// LIGHTBOX
let lbIdx=0;
function openLB(i){lbIdx=i;updLB();document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden'}
function updLB(){const p=P[lbIdx];document.getElementById('lb-img').src=I+p.img;document.getElementById('lb-name').textContent=p.name;document.getElementById('lb-year').textContent=p.year+' · '+p.type}
function lbNav(d){lbIdx=(lbIdx+d+P.length)%P.length;updLB()}

// SPLIT
function openSplit(i){
  const p=P[i];
  document.getElementById('sp-img').src=I+p.img;
  document.getElementById('sp-name').textContent=p.name;
  document.getElementById('sp-type').textContent=p.type+' · '+p.year;
  document.getElementById('sp-desc').textContent=p.desc;
  document.getElementById('sp-loc').textContent=p.location;
  document.getElementById('sp-tp').textContent=p.type;
  document.getElementById('sp-area').textContent=p.area;
  document.getElementById('sp-year').textContent=p.year;
  document.getElementById('splitModal').classList.add('open');
  document.body.style.overflow='hidden';
}

// CARD
function openCard(i){
  const p=P[i];
  document.getElementById('cd-img').src=I+p.img;
  document.getElementById('cd-name').textContent=p.name;
  document.getElementById('cd-type').textContent=p.type+' · '+p.year;
  document.getElementById('cd-desc').textContent=p.desc;
  document.getElementById('cd-loc').textContent=p.location;
  document.getElementById('cd-area').textContent=p.area;
  document.getElementById('cd-year').textContent=p.year;
  document.getElementById('cardModal').classList.add('open');
  document.body.style.overflow='hidden';
}

// CINEMA
function openCinema(i){
  const p=P[i];
  document.getElementById('cm-img').src=I+p.img;
  document.getElementById('cm-name').textContent=p.name;
  document.getElementById('cm-type').textContent=p.type;
  document.getElementById('cm-desc').textContent=p.desc;
  document.getElementById('cm-loc').textContent=p.location;
  document.getElementById('cm-area').textContent=p.area;
  document.getElementById('cm-year').textContent=p.year;
  document.getElementById('cinemaModal').classList.add('open');
  document.body.style.overflow='hidden';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeAll();
  if(document.getElementById('lightbox').classList.contains('open')){
    if(e.key==='ArrowLeft')lbNav(-1);
    if(e.key==='ArrowRight')lbNav(1);
  }
});
</script>
</body>
</html>
